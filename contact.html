<!DOCTYPE html>

  <style>
    .contact-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 4rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .contact-left h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .contact-left h1 em { font-style: italic; color: var(--violet-dark); }

    .contact-left p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
    }

    .contact-item:hover { color: var(--violet-dark); }

    .contact-icon {
      width: 36px;
      height: 36px;
      background: var(--violet-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .contact-form {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: white;
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--violet);
    }

    .form-group textarea {
      height: 120px;
      resize: vertical;
    }

    @media (max-width: 768px) {
      .contact-wrap { grid-template-columns: 1fr; padding: 3rem 1.5rem; gap: 2.5rem; }
    }
  </style>
</head>
